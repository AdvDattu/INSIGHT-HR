name: Build Emergent Mobile App (APK)

# This environment variable fixes the Node.js 20 warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Android folder (Expo Prebuild)
        # Added --clean to ensure a fresh, uncorrupted generation
        run: |
          npx expo prebuild --platform android --clean

      - name: Build Android APK
        # Added --no-daemon to prevent the Exit Code 254 Memory Crash
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: INSIGHT-HR-App
          path: android/app/build/outputs/apk/release/app-release.apk
