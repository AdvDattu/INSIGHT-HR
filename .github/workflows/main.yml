name: Build Emergent Mobile App (APK)

on:
  workflow_dispatch: # Allows you to trigger the build manually in GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Generate Android folder (Expo Prebuild)
        # Emergent apps often hide the native code. This step forces it to generate.
        run: |
          if [ ! -d "android" ]; then
            npx expo prebuild --platform android
          fi

      - name: Build Android APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: INSIGHT-HR-App
          path: android/app/build/outputs/apk/release/app-release.apk
